<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#05080d" />
<title>PAS-VISOR-0E.OT1V | Visual Fix</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<style>
:root{--p:rgba(5,9,16,.54);--b:rgba(135,200,255,.38);--t:#eef7ff;--m:#aac0d2;--g:#79f2b0;--r:#ff7c86;--c:#6ed9ff;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:var(--t);font-family:system-ui,-apple-system,Segoe UI,sans-serif}button,input{font:inherit;color:inherit}
#video{position:fixed;inset:0;width:100vw;height:100vh;object-fit:cover;background:#111;z-index:0;opacity:1!important;filter:none!important;transform:translateZ(0)}
#overlay{position:fixed;inset:0;width:100vw;height:100vh;z-index:2;pointer-events:auto;touch-action:manipulation;background:transparent}
#top{position:fixed;left:10px;right:10px;top:calc(env(safe-area-inset-top) + 8px);z-index:5;display:grid;grid-template-columns:repeat(2,1fr);gap:7px;pointer-events:none}
.card{border:1px solid var(--b);background:rgba(5,9,16,.36);backdrop-filter:blur(2px);border-radius:16px;padding:9px 11px;box-shadow:0 0 14px rgba(0,0,0,.18)}
.label{font-size:11px;letter-spacing:.1em;color:var(--m);text-transform:uppercase}.value{font-size:17px;font-weight:800;margin-top:3px}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#8792a0;margin-right:6px}.ok{background:var(--g)}.bad{background:var(--r)}.warn{background:#ffd36a}
#centerHint{position:fixed;left:50%;top:50%;z-index:3;width:70px;height:70px;margin:-35px 0 0 -35px;border:1px solid rgba(110,217,255,.45);border-radius:50%;pointer-events:none}#centerHint:before,#centerHint:after{content:"";position:absolute;background:rgba(110,217,255,.55)}#centerHint:before{left:50%;top:16px;width:1px;height:38px}#centerHint:after{left:16px;top:50%;width:38px;height:1px}
#panel{position:fixed;left:10px;right:10px;bottom:calc(env(safe-area-inset-bottom) + 10px);z-index:6;background:rgba(5,9,16,.58);border:1px solid var(--b);border-radius:20px;padding:12px;backdrop-filter:blur(3px)}
#assistant{font-weight:900;font-size:20px;margin-bottom:5px}.sub{color:var(--m);font-size:13px;line-height:1.35;min-height:18px}.row{display:grid;grid-template-columns:1fr 82px;gap:8px;margin-top:10px}input{width:100%;border:1px solid rgba(110,217,255,.38);background:rgba(255,255,255,.06);border-radius:15px;padding:12px 14px;outline:none}button{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.09);border-radius:15px;padding:11px 10px;font-weight:800;min-height:45px}button.primary{border-color:rgba(121,242,176,.55);background:rgba(65,220,130,.18)}#buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:9px}.small{font-size:12px;color:var(--m);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#start{position:fixed;inset:0;z-index:20;background:#05080d;display:flex;align-items:center;justify-content:center;padding:22px}.startBox{max-width:460px;width:100%;border:1px solid var(--b);border-radius:24px;background:rgba(8,15,26,.9);padding:20px}.startBox h1{font-size:23px;margin:0 0 8px}.startBox p{color:var(--m);line-height:1.45}.startBox button{width:100%;margin-top:10px}.hidden{display:none!important}
@media(max-height:690px){#assistant{font-size:16px}.sub{font-size:12px}#buttons{grid-template-columns:repeat(3,1fr)}button{min-height:40px;padding:9px 8px}.row{margin-top:7px}#panel{padding:10px}.card{padding:7px 9px}.value{font-size:15px}}
</style>
</head>
<body>
<video id="video" autoplay muted playsinline webkit-playsinline></video>
<canvas id="overlay"></canvas><div id="centerHint"></div>
<div id="top">
 <div class="card"><div class="label">Camera</div><div id="cam" class="value"><span class="dot"></span>대기</div></div>
 <div class="card"><div class="label">Vision AI</div><div id="ai" class="value"><span class="dot"></span>꺼짐</div></div>
 <div class="card"><div class="label">Objects</div><div id="obj" class="value">0개 / 0.0 fps</div></div>
 <div class="card"><div class="label">Target</div><div id="tar" class="value">미지정</div></div>
</div>
<div id="panel">
 <div id="assistant">카메라를 먼저 표시합니다</div>
 <div id="reason" class="sub">AI 탐지는 렉 방지를 위해 별도 버튼으로 켭니다.</div>
 <div class="row"><input id="query" placeholder="찾을 대상: 사람, 자동차, 비행기, 휴대폰, 책..."/><button id="search" class="primary">탐색</button></div>
 <div id="buttons"><button id="flip">카메라 전환</button><button id="aiBtn">AI 켜기</button><button id="clear">해제</button></div>
 <div id="diag" class="small">진단 대기</div>
</div>
<div id="start"><div class="startBox"><h1>PAS-VISOR-0E.OT1V</h1><p>이번 수정본은 카메라 원본을 최우선으로 보이게 했습니다. 어두운 필터와 스캔 배경을 제거했고, 객체 탐지는 필요할 때만 켭니다.</p><button id="startBtn" class="primary">카메라 시작</button></div></div>
<script>
const $=id=>document.getElementById(id);const video=$('video'),cv=$('overlay'),ctx=cv.getContext('2d');
const cam=$('cam'),ai=$('ai'),obj=$('obj'),tar=$('tar'),assistant=$('assistant'),reason=$('reason'),diag=$('diag');
let stream=null, facing='environment', model=null, aiOn=false, detecting=false, preds=[], tracks=[], targetId=null, searchTerm='', lastDetect=0, fps=0, frames=0, lastFps=performance.now();
const ko={person:'사람',car:'자동차',truck:'트럭',bus:'버스',motorcycle:'오토바이',bicycle:'자전거',airplane:'비행기',cell_phone:'휴대폰',book:'책',cup:'컵',chair:'의자',laptop:'노트북',tv:'TV',dog:'개',cat:'고양이'};
const aliases={'사람':'person','자동차':'car','차':'car','비행기':'airplane','휴대폰':'cell phone','핸드폰':'cell phone','폰':'cell phone','책':'book','컵':'cup','의자':'chair','노트북':'laptop','개':'dog','고양이':'cat'};
function status(el,type,text){el.innerHTML=`<span class="dot ${type}"></span>${text}`}
function resize(){const dpr=1;cv.width=Math.round(innerWidth*dpr);cv.height=Math.round(innerHeight*dpr);cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',resize);resize();
async function startCamera(){status(cam,'warn','요청 중');try{if(stream)stream.getTracks().forEach(t=>t.stop());let cons={audio:false,video:{facingMode:{ideal:facing},width:{ideal:640},height:{ideal:480},frameRate:{ideal:24,max:30}}};try{stream=await navigator.mediaDevices.getUserMedia(cons)}catch(e){stream=await navigator.mediaDevices.getUserMedia({audio:false,video:true})}video.srcObject=stream;await video.play();status(cam,'ok',facing==='environment'?'후면 작동':'전면 작동');$('start').classList.add('hidden');assistant.textContent='카메라 표시 성공';reason.textContent='이제 AI 켜기를 누르면 객체 탐색을 시작합니다.';loop()}catch(e){status(cam,'bad','실패');assistant.textContent='카메라 표시 실패';reason.textContent=(e.name||'Error')+' : '+(e.message||'권한 또는 HTTPS 상태를 확인하십시오.')}}
async function loadAI(){if(model){aiOn=!aiOn;status(ai,aiOn?'ok':'',''+(aiOn?'작동':'꺼짐'));return}status(ai,'warn','로딩');assistant.textContent='AI 모델을 불러오는 중입니다';reason.textContent='첫 실행은 인터넷과 기기 성능에 따라 시간이 걸릴 수 있습니다.';try{await tf.setBackend('webgl').catch(()=>tf.setBackend('wasm')).catch(()=>{});await tf.ready();model=await cocoSsd.load({base:'lite_mobilenet_v2'});aiOn=true;status(ai,'ok','작동');assistant.textContent='주변 객체를 탐색 중입니다';reason.textContent='박스를 터치하면 대상을 잠급니다.'}catch(e){status(ai,'bad','실패');assistant.textContent='AI 로딩 실패';reason.textContent=(e.message||'CDN 연결 또는 WebGL 문제일 수 있습니다.')}}
function videoRect(){const vw=video.videoWidth||640,vh=video.videoHeight||480,sw=innerWidth,sh=innerHeight;const s=Math.max(sw/vw,sh/vh),w=vw*s,h=vh*s,x=(sw-w)/2,y=(sh-h)/2;return{x,y,w,h,s,vw,vh}}
function mapBox(b){const r=videoRect();return{x:r.x+b[0]*r.s,y:r.y+b[1]*r.s,w:b[2]*r.s,h:b[3]*r.s}}
function center(b){return{x:b.x+b.w/2,y:b.y+b.h/2}}
function updateTracks(newPreds){const used=new Set(), next=[];newPreds.forEach(p=>{const b=mapBox(p.bbox), c=center(b);let best=null,bd=1e9;tracks.forEach(t=>{if(used.has(t.id)||t.class!==p.class)return;const tc=center(t.box);const dist=Math.hypot(c.x-tc.x,c.y-tc.y);if(dist<bd&&dist<160){bd=dist;best=t}});const id=best?best.id:Math.max(0,...tracks.map(t=>t.id))+next.length+1;if(best)used.add(best.id);next.push({id,class:p.class,score:p.score,box:b,seen:best?(best.seen+1):1})});tracks=next.slice(0,8)}
async function detect(now){if(!aiOn||!model||detecting||!video.videoWidth||now-lastDetect<650)return;detecting=true;lastDetect=now;try{const p=await model.detect(video,8,0.52);preds=p;updateTracks(p);if(searchTerm&&!targetId){const want=aliases[searchTerm]||searchTerm;const hit=tracks.find(t=>t.class===want||ko[t.class.replace(' ','_')]===searchTerm);if(hit)targetId=hit.id}}catch(e){}detecting=false}
function draw(){ctx.clearRect(0,0,innerWidth,innerHeight);ctx.lineWidth=2;ctx.font='bold 14px system-ui';tracks.forEach(t=>{const locked=t.id===targetId;ctx.strokeStyle=locked?'#79f2b0':'#6ed9ff';ctx.fillStyle=locked?'rgba(121,242,176,.13)':'rgba(110,217,255,.08)';ctx.fillRect(t.box.x,t.box.y,t.box.w,t.box.h);ctx.strokeRect(t.box.x,t.box.y,t.box.w,t.box.h);ctx.fillStyle=locked?'#79f2b0':'#eaf7ff';const name=ko[t.class.replace(' ','_')]||t.class;ctx.fillText(`#${t.id} ${name} ${Math.round(t.score*100)}%`,t.box.x+6,Math.max(18,t.box.y-6))});const t=tracks.find(x=>x.id===targetId);if(t){const c=center(t.box);ctx.strokeStyle='#79f2b0';ctx.beginPath();ctx.arc(c.x,c.y,42,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(innerWidth/2,innerHeight/2);ctx.lineTo(c.x,c.y);ctx.stroke();}}
function updateText(){const t=tracks.find(x=>x.id===targetId);obj.textContent=`${tracks.length}개 / ${fps.toFixed(1)} fps`;if(t){const name=ko[t.class.replace(' ','_')]||t.class;tar.textContent=`#${t.id} ${name}`;const c=center(t.box), dx=c.x-innerWidth/2, dy=c.y-innerHeight/2;let pos=Math.abs(dx)<innerWidth*.12&&Math.abs(dy)<innerHeight*.12?'화면 중앙':(dx>0?'오른쪽':'왼쪽');assistant.textContent=`대상 추적 중: #${t.id} ${name} · ${pos}`;reason.textContent=`신뢰도 ${Math.round(t.score*100)}%, 화면에서 같은 대상을 계속 연결 중입니다.`}else{tar.textContent='미지정';assistant.textContent=searchTerm?`'${searchTerm}' 대상을 탐색 중입니다`:'주변 객체를 탐색 중입니다';reason.textContent=aiOn?'박스를 터치하면 대상을 잠급니다.':'AI 탐지는 꺼져 있습니다. 카메라 화면 확인 후 AI를 켜십시오.'}const tr=stream?.getVideoTracks?.()[0];diag.textContent=`video ${video.videoWidth||0}×${video.videoHeight||0} / ${tr?.label||'track 대기'}`}
function loop(now=performance.now()){frames++;if(now-lastFps>1000){fps=frames*1000/(now-lastFps);frames=0;lastFps=now}detect(now);draw();updateText();requestAnimationFrame(loop)}
cv.addEventListener('click',e=>{const x=e.clientX,y=e.clientY;let hit=[...tracks].reverse().find(t=>x>=t.box.x&&x<=t.box.x+t.box.w&&y>=t.box.y&&y<=t.box.y+t.box.h);if(hit){targetId=hit.id}else{targetId=null}});
$('startBtn').onclick=startCamera;$('flip').onclick=()=>{facing=facing==='environment'?'user':'environment';startCamera()};$('aiBtn').onclick=loadAI;$('clear').onclick=()=>{targetId=null;searchTerm='';$('query').value=''};$('search').onclick=()=>{searchTerm=$('query').value.trim();targetId=null;if(!aiOn)loadAI()};
</script>
</body>
</html>
